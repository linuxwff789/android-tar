name: Build GNU tar for Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake autopoint gettext

      - name: Setup NDK
        run: |
          curl -sL https://dl.google.com/android/repository/android-ndk-r27b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          echo "NDK=$(pwd)/android-ndk-r27b" >> $GITHUB_ENV

      - name: Download GNU tar source
        run: |
          curl -sL https://ftp.gnu.org/gnu/tar/tar-1.35.tar.gz | tar xz

      - name: Cross-compile
        run: |
          NDK=$NDK
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=21
          CC=$TOOLCHAIN/bin/${TARGET}${API}-clang

          export PATH=$TOOLCHAIN/bin:$PATH

          cd tar-1.35
          ./configure \
            --host=$TARGET \
            --prefix=/tmp/tar-install \
            CC="$CC" \
            --disable-nls \
            --disable-largefile \
            gl_cv_func_getwd_without_getcwd=yes \
            ac_cv_func_malloc_0_nonnull=yes \
            ac_cv_func_realloc_0_nonnull=yes || (cat config.log | tail -30 && exit 1)

          make -j$(nproc)
          make install
          file /tmp/tar-install/bin/tar

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.35
          name: "GNU tar 1.35 for Android ARM64"
          files: /tmp/tar-install/bin/tar
          make_latest: true
          overwrite: true

name: Build GNU tar for Android

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake gettext

      - name: Setup NDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | sdkmanager --sdk_root=$ANDROID_HOME "ndk;27.0.12077973"
          echo "NDK=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Download & extract GNU tar
        run: |
          curl -sL https://ftp.gnu.org/gnu/tar/tar-1.35.tar.gz | tar xz
          cd tar-1.35
          cat configure.ac | head -5

      - name: Cross-compile for arm64-v8a
        run: |
          NDK=$ANDROID_HOME/ndk/27.0.12077973
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=21
          CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
          SYSROOT=$TOOLCHAIN/sysroot

          cd tar-1.35
          ./configure \
            --host=$TARGET \
            --prefix=/tmp/tar-install \
            CC="$CC" \
            CXX="$CXX" \
            CFLAGS="--sysroot=$SYSROOT -O2" \
            LDFLAGS="--sysroot=$SYSROOT" \
            --disable-nls \
            --disable-largefile \
            gl_cv_func_getwd_without_getcwd=yes \
            ac_cv_func_malloc_0_nonnull=yes \
            ac_cv_func_realloc_0_nonnull=yes

          make -j$(nproc)
          make install

          # Verify
          file /tmp/tar-install/bin/tar
          /tmp/tar-install/bin/tar --version | head -1

      - name: Package binary
        run: |
          cd /tmp/tar-install
          tar czf /tmp/tar-android-arm64.tar.gz bin/tar
          ls -lh /tmp/tar-android-arm64.tar.gz

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.35
          name: "GNU tar 1.35 for Android ARM64"
          files: /tmp/tar-android-arm64.tar.gz
          make_latest: true
          overwrite: true
